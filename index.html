<script>
document.addEventListener('DOMContentLoaded', function() {
  // ═══════════════════  YOUR FULL DATA  ═══════════════════
  const PROJECTS = [
    { id:1, title:"InSAR Time Series for Highway Subsidence", cat:"InSAR / Geotech", loc:"Sloterdijk to Rijksweg, Netherlands", short:"13 Sentinel‑1 images (Jan–May 2024) processed with SNAP+SNAPHU.", full:"Processed 13 Sentinel‑1 SLC images using SNAP + SNAPHU to generate 12 displacement maps. Applied Goldstein filtering (α=0.5), phase unwrapping, and terrain correction. Extracted A10 highway profiles and produced time series graph showing subsidence over 5 months.", tech:["SNAP","SNAPHU","Sentinel‑1"], pdf:"assets/portfolio-photos/insar/insar.pdf", media:[{type:"image",src:"assets/portfolio-photos/insar/Screenshot 2026-05-08 194722.png",caption:"Interferogram – phase difference"},{type:"image",src:"assets/portfolio-photos/insar/Screenshot 2026-05-08 203715.png",caption:"Displacement map (mm)"},{type:"image",src:"assets/portfolio-photos/insar/Screenshot 2026-05-10 125056.png",caption:"Goldstein filtered interferogram"},{type:"image",src:"assets/portfolio-photos/insar/Screenshot 2026-05-10 194901.png",caption:"Unwrapped phase and time series"},{type:"image",src:"assets/portfolio-photos/insar/Screenshot 2026-05-17 090637.png",caption:"Subsidence profile – A10"},{type:"image",src:"assets/portfolio-photos/insar/Screenshot 2026-05-17 090658.png",caption:"Cumulative displacement"}] },
    { id:2, title:"NDVI Timelapse of Kathmandu Valley (2000–2026)", cat:"Remote Sensing", loc:"Kathmandu Valley, Nepal", short:"26‑year vegetation change using Landsat & Sentinel‑2.", full:"Processed 28 images in Google Earth Engine – scaling, cloud masking, NDVI calculation, harmonization, median composites. Built 5‑class timelapse and exported 1080p MP4.", tech:["Google Earth Engine","Landsat 5/8","Sentinel‑2"], pdf:"assets/portfolio-photos/ndvi/NDVI_Report_Kathmandu_Valley.pdf", media:[{type:"image",src:"assets/portfolio-photos/ndvi/GEE1.jpg",caption:"NDVI classification"},{type:"image",src:"assets/portfolio-photos/ndvi/GEE2.jpg",caption:"Change detection"},{type:"video",src:"assets/portfolio-photos/ndvi/Map.mp4",caption:"Timelapse animation"}] },
    { id:3, title:"Hospital Accessibility in Colorado", cat:"GIS", loc:"Colorado, USA", short:"Network drive‑time analysis – 30/60‑min service areas.", full:"Generated service areas from specialist hospitals, overlaid county population, area‑weighted estimation. Revealed spatial disparities in healthcare access.", tech:["ArcGIS Network Analyst","Population data"], media:[{type:"image",src:"assets/portfolio-photos/hospital/30min_Map.png",caption:"30‑minute service areas"},{type:"image",src:"assets/portfolio-photos/hospital/60_min Map.png",caption:"60‑minute service areas"},{type:"image",src:"assets/portfolio-photos/hospital/PopulationMap.png",caption:"Population density overlay"}] },
    { id:4, title:"Urban Sprawl Analysis of Kathmandu Valley", cat:"GIS", loc:"Kathmandu Valley, Nepal", short:"Landsat 8/9 NDBI change, ALOS PALSAR slope filtering.", full:"NDBI change detection with DEM slope filtering to isolate growth on stable terrain. Validated urban expansion map.", tech:["Landsat","ALOS PALSAR","ArcGIS"], media:[{type:"image",src:"assets/portfolio-photos/urban-sprawl/2016.png",caption:"NDBI 2016"},{type:"image",src:"assets/portfolio-photos/urban-sprawl/2026.png",caption:"NDBI 2026"},{type:"image",src:"assets/portfolio-photos/urban-sprawl/slopemap.png",caption:"Slope filtering"},{type:"image",src:"assets/portfolio-photos/urban-sprawl/Urban Sprawl.png",caption:"Urban expansion map"}] },
    { id:5, title:"UAV Landslide Susceptibility Mapping", cat:"UAV/GIS", loc:"Sisneri, Solukhumbu, Nepal", short:"UAV orthomosaic/DEM, weighted overlay hazard zonation.", full:"High‑resolution DEM and orthomosaic from drone; derived terrain factors; weighted overlay to classify hazard zones.", tech:["UAV","Agisoft","ArcGIS"], media:[{type:"image",src:"assets/portfolio-photos/uav-landslide/Aspect Map.png",caption:"Aspect map"},{type:"image",src:"assets/portfolio-photos/uav-landslide/BaseMap.png",caption:"UAV orthomosaic"},{type:"image",src:"assets/portfolio-photos/uav-landslide/Weighted Overlay.png",caption:"Hazard zonation"}] },
    { id:6, title:"Flood Inundation Mapping", cat:"Hydrology", loc:"Narayani River, Nepal", short:"HEC‑RAS 2D unsteady flow, flood depth/velocity mapping.", full:"DEM preparation and terrain correction; 2D unsteady flow simulation; extracted flood depth, velocity, WSE for hazard analysis.", tech:["HEC‑RAS 2D","ArcGIS"], pdf:"assets/portfolio-photos/flood/FloodInundationMap.pdf", media:[{type:"image",src:"assets/portfolio-photos/flood/Screenshot 2026-04-23 230415.png",caption:"HEC‑RAS 2D mesh"},{type:"image",src:"assets/portfolio-photos/flood/Screenshot 2026-04-23 233808.png",caption:"Flood depth map"}] },
    { id:7, title:"Substation Backfill Volumetric Analysis", cat:"Civil 3D", loc:"Balganga, Janakpur, Nepal", short:"DGPS → surface modeling → corridors → cut/fill volumes.", full:"DGPS survey, surface creation, cross‑sections, corridor modeling, quantity estimation.", tech:["Civil 3D","DGPS"], pdf:"assets/portfolio-photos/civil3d/BACKFILLING.pdf", media:[{type:"image",src:"assets/portfolio-photos/civil3d/Screenshot 2026-05-17 091158.png",caption:"DGPS survey points"},{type:"image",src:"assets/portfolio-photos/civil3d/Screenshot 2026-05-17 091526.png",caption:"Corridor model"}] },
    { id:8, title:"Earthquake Analysis of Nepal", cat:"Seismology / GIS", loc:"Nepal (1978‑2025)", short:"Mainshock declustering & animation using USGS catalog.", full:"Processed USGS catalog (M≥5, 1978‑2025) using Gardner‑Knopoff declustering. 58 mainshocks. Tools: Python, ArcGIS Pro.", tech:["ArcGIS","Python","Animation"], pdf:"assets/portfolio-photos/earthquake/NEpal earthquake mainshocks.pdf", media:[{type:"video",src:"assets/portfolio-photos/earthquake/Nepal_EarthQuakes_Animation.mp4",caption:"Earthquake animation"},{type:"image",src:"assets/portfolio-photos/earthquake/earthquake mainshocks.png",caption:"Mainshocks map"}] }
  ];

  const WORK_IMAGES = {
    balefi:{folder:"Balefi",files:['IMG_20230910_133439.jpg','IMG_20230913_111457.jpg','IMG_20230922_131952.jpg','IMG_20231014_080619.jpg'],captions:["Tower Erection","Tower Erection","Concreting chimney","Completed Tower"]},
    lalbandi:{folder:"Salempur",files:['IMG-20241008-WA0003.jpg','IMG-20250129-WA0000.jpg','IMG_20231107_104434.jpg','IMG_20240120_112353.jpg','IMG_20240206_140830.jpg','Screenshot 2026-05-16 204535.png'],captions:["Salempur Substation","Plastering","Surveying","Rebar works","Plinth beam","Layout view"]},
    dhalkebar:{folder:"Balganga",files:['IMG-20250124-WA0003.jpg','IMG_20250326_152652.jpg','IMG_20250403_094117.jpg','Screenshot 2026-05-16 204005.png'],captions:["Staff Quarter","Control Room","Formworks","Layout"]},
    sandikharga:{folder:"Burtibang",files:['IMG_20231121_112353.jpg','IMG_20231127_150353.jpg','IMG_20231216_085522.jpg','Screenshot 2026-05-16 205216.png'],captions:["Tower Erection","Stub Setting","DGPS survey","Tower locations"]},
    tamghas:{folder:"Tamghas",files:['IMG_20231119_124336.jpg','IMG_20231121_121929.jpg','IMG_20231125_114431.jpg','IMG_20231129_102312.jpg'],captions:["Transformer","Survey","Survey","Switchyard"]}
  };

  const FREELANCE = [
    { id:"hvac", title:"HVAC System Design & Modeling", date:"2024", desc:"Designed complete HVAC system for a laboratory using HAP 6.0 – load calculation, duct sizing.", folder:"assets/freelance-photos/hvac/", files:['duct-layout.png'], captions:["HVAC duct layout"] },
    { id:"3d-modeling", title:"3D Building Planning & Modeling", date:"2023–2024", desc:"Detailed architectural visualizations using SketchUp and Revit.", folder:"assets/freelance-photos/3d-modeling/", files:['1.png','2.png','3.jpg'], captions:["Balganga Staff Quarter","Control Room","Residential"] },
    { id:"structural-analysis", title:"Structural Analysis for Client Buildings", date:"2024", desc:"STAAD Pro analysis ensuring compliance with load standards.", folder:"assets/freelance-photos/structural-analysis/", files:['1.png','2.png'], captions:["STAAD model","Load analysis"] },
    { id:"drafting", title:"2D Drafting (AutoCAD)", date:"2023–2025", desc:"Detailed 2D CAD drawings: floor plans, sections, site layouts.", folder:"assets/freelance-photos/drafting/", files:['1.png','2.png','3.png'], captions:["Site layout","Residential plan","Tower locations"] },
    { id:"abi", title:"ABI Pier Structural Design Workshop", date:"2023 (Earthquake Day)", desc:"Designed Adjustable Base Isolation Pier prototype with group.", folder:"assets/freelance-photos/abi/", files:['1.jpeg'], captions:["Prototype presentation"] },
    { id:"sisneri", title:"Slope Stability & Mitigation – Sisneri Landslide", date:"2023 (Final Year)", desc:"Drone survey, geotechnical investigation, GeoStudio SLOPE/W.", folder:"assets/portfolio-photos/sisneri-landslide/", files:['Damage due to Landslide.JPG','Group Members.JPG'], captions:["Damage","Group"], pdf:"assets/portfolio-photos/sisneri-landslide/Sisneri_Landslide_Report.pdf" }
  ];

  const SKILLS_DATA = [
    { name:"ArcGIS Pro & QGIS", pct:92 },
    { name:"Google Earth Engine", pct:85 },
    { name:"AutoCAD & Civil 3D", pct:95 },
    { name:"HEC‑RAS 2D", pct:80 },
    { name:"STAAD Pro & SAP2000", pct:78 },
    { name:"Python (GIS scripting)", pct:70 }
  ];

  const CERTIFICATES = [
    { icon:"fa-certificate", title:"SAP2000 Training", desc:"Advanced structural analysis" },
    { icon:"fa-drafting-compass", title:"AutoCAD Professional", desc:"Design & drafting" },
    { icon:"fa-id-card", title:"Nepal Engineering Council", desc:"Reg. No: 80593" },
    { icon:"fa-layer-group", title:"ABI Pier Workshop", desc:"Seismic isolation" }
  ];
  const CERT_THUMBS = [
    { file:"autocad.jpg", caption:"AutoCAD Certification" },
    { file:"NEC.png", caption:"NEC Registration" },
    { file:"SAP.jpg", caption:"SAP2000 Training" }
  ];

  // ═══════════════ INIT ═══════════════
  gsap.registerPlugin(ScrollTrigger);

  // Lenis smooth scroll
  class SimpleLenis {
    constructor() { this.ease=0.08; this.current=window.scrollY; this.target=window.scrollY; this.init(); }
    init() { window.addEventListener('scroll',()=>{this.target=window.scrollY;}); this.loop(); }
    loop() { this.current+=(this.target-this.current)*this.ease; ScrollTrigger.update(); requestAnimationFrame(()=>this.loop()); }
  }
  new SimpleLenis();

  // Cursor
  const dot=document.getElementById('cursor-dot'), ring=document.getElementById('cursor-ring');
  let mX=0,mY=0,rX=0,rY=0;
  document.addEventListener('mousemove',e=>{mX=e.clientX;mY=e.clientY;gsap.set(dot,{x:mX,y:mY});});
  function animRing(){rX+=(mX-rX)*0.12;rY+=(mY-rY)*0.12;gsap.set(ring,{x:rX,y:rY});requestAnimationFrame(animRing);} animRing();
  document.querySelectorAll('a,button,.btn,.project-card,.site-chip,.fl-thumb,.m-media-wrap').forEach(el=>{
    el.addEventListener('mouseenter',()=>document.body.classList.add('cursor-hover'));
    el.addEventListener('mouseleave',()=>document.body.classList.remove('cursor-hover'));
  });

  // Three.js
  (function(){
    const canvas=document.getElementById('three-canvas');
    const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    const scene=new THREE.Scene(), camera=new THREE.PerspectiveCamera(60,canvas.offsetWidth/canvas.offsetHeight,0.1,100);
    camera.position.z=4;
    const geo=new THREE.TorusKnotGeometry(1.2,0.38,160,20);
    const mat=new THREE.MeshBasicMaterial({color:0x0e0e0e,wireframe:true,opacity:0.12,transparent:true});
    const mesh=new THREE.Mesh(geo,mat); scene.add(mesh);
    const geoSolid=new THREE.TorusKnotGeometry(1.18,0.36,120,18);
    const matSolid=new THREE.MeshBasicMaterial({color:0xf5f4f0});
    const meshSolid=new THREE.Mesh(geoSolid,matSolid); scene.add(meshSolid);
    const partGeo=new THREE.BufferGeometry(), count=200, positions=new Float32Array(count*3);
    for(let i=0;i<count*3;i++) positions[i]=(Math.random()-0.5)*8;
    partGeo.setAttribute('position',new THREE.BufferAttribute(positions,3));
    const partMat=new THREE.PointsMaterial({color:0x0e0e0e,size:0.025,transparent:true,opacity:0.3});
    const particles=new THREE.Points(partGeo,partMat); scene.add(particles);
    let mx=0,my=0,targetRX=0,targetRY=0;
    document.addEventListener('mousemove',e=>{mx=(e.clientX/window.innerWidth-0.5)*2; my=-(e.clientY/window.innerHeight-0.5)*2;});
    function resize(){const w=canvas.offsetWidth,h=canvas.offsetHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
    resize(); window.addEventListener('resize',resize);
    let t=0;
    function animate(){requestAnimationFrame(animate);t+=0.005;targetRX+=(my*0.4-targetRX)*0.05;targetRY+=(mx*0.4-targetRY)*0.05;mesh.rotation.x=targetRX+t*0.3;mesh.rotation.y=targetRY+t*0.5;meshSolid.rotation.x=mesh.rotation.x;meshSolid.rotation.y=mesh.rotation.y;particles.rotation.y=t*0.05;mesh.position.y=Math.sin(t*0.7)*0.12;meshSolid.position.y=mesh.position.y;renderer.render(scene,camera);}
    animate();
  })();

  // Hero animation
  const tl=gsap.timeline({delay:0.2});
  tl.to('.hero-name .word',{y:0,duration:1.1,ease:'power4.out',stagger:0.12})
    .to('.hero-subtitle',{opacity:1,y:0,duration:0.8,ease:'power3.out'},'-=0.5')
    .to('.hero-tag',{opacity:0.5,y:0,duration:0.6},'-=0.8')
    .from('.hero-cta .btn',{opacity:0,y:20,stagger:0.1,duration:0.6,ease:'power3.out'},'-=0.4');

  // Scroll reveals
  gsap.utils.toArray('.reveal').forEach(el=>{
    gsap.to(el,{opacity:1,y:0,duration:0.9,ease:'power3.out',scrollTrigger:{trigger:el,start:'top 88%',toggleActions:'play none none none'}});
  });

  // Render skills bars
  function renderSkills(){
    const cont=document.getElementById('skillsContainer');
    if(!cont) return;
    cont.innerHTML=SKILLS_DATA.map(s=>`
      <div class="skill-item reveal">
        <div class="skill-name"><span>${s.name}</span><span class="skill-pct">${s.pct}%</span></div>
        <div class="skill-bar-bg"><div class="skill-bar-fill" data-width="${s.pct}"></div></div>
      </div>`).join('');
    document.querySelectorAll('.skill-bar-fill').forEach(bar=>{
      const w=bar.dataset.width;
      ScrollTrigger.create({trigger:bar,start:'top 85%',onEnter:()=>bar.style.width=w+'%'});
    });
  }

  // Render project cards
  function buildProjects(){
    const grid=document.getElementById('projGrid');
    if(!grid) return;
    grid.innerHTML=PROJECTS.map(p=>{
      let thumbHTML='<div class="project-img-placeholder">Image</div>';
      if(p.media&&p.media.length>0){
        const first=p.media[0];
        if(first.type==='image') thumbHTML=`<img src="${encodeURI(first.src)}" alt="${p.title}" />`;
      }
      return `<div class="project-card reveal" onclick="openProjModal(${p.id})">
        <div class="project-img">${thumbHTML}</div>
        <div class="project-info">
          <div class="project-tags">${p.tech.map(t=>`<span class="project-tag">${t}</span>`).join('')}</div>
          <h3 class="project-title">${p.title}</h3>
          <p class="project-desc">${p.short}</p>
          <span class="project-link" onclick="event.stopPropagation();openProjModal(${p.id})">View Project →</span>
        </div>
      </div>`;
    }).join('');
  }

  // Render freelance cards
  function buildFreelance(){
    const grid=document.getElementById('flGrid');
    if(!grid) return;
    grid.innerHTML=FREELANCE.map(f=>{
      const thumbs=f.files&&f.files.length?f.files.map((file,i)=>{
        const src=encodeURI(f.folder+file);
        return `<div class="fl-thumb" onclick="event.stopPropagation();openCarouselFromList(${JSON.stringify(f.files.map((ff,ii)=>({src:encodeURI(f.folder+ff),caption:f.captions[ii]||ff}))).replace(/"/g,'&quot;')},${i})"><img src="${src}" alt=""></div>`;
      }).join(''):'';
      return `<div class="fl-card reveal">
        <h3>${f.title}</h3><div class="fl-date">${f.date}</div><p>${f.desc}</p>
        <div class="fl-thumbs">${thumbs}</div>
        ${f.pdf?`<a href="${f.pdf}" target="_blank" class="btn btn-outline" style="margin-top:8px;padding:8px 16px;font-size:0.75rem;">Report</a>`:''}
      </div>`;
    }).join('');
  }

  // Render certificates
  function buildCerts(){
    const grid=document.getElementById('certGrid');
    if(grid) grid.innerHTML=CERTIFICATES.map(c=>`
      <div class="cert-item reveal">
        <div class="cert-icon"><i class="fas ${c.icon}"></i></div>
        <div class="cert-text"><strong>${c.title}</strong><span>${c.desc}</span></div>
      </div>`).join('');
    const thumbs=document.getElementById('certThumbs');
    if(thumbs) thumbs.innerHTML=CERT_THUMBS.map((c,i)=>{
      const src=encodeURI('assets/Cerififcations/'+c.file);
      return `<img src="${src}" class="fl-thumb" style="width:80px;height:60px;cursor:pointer;" onclick="openCarouselFromList(${JSON.stringify(CERT_THUMBS.map(cc=>({src:encodeURI('assets/Cerififcations/'+cc.file),caption:cc.caption}))).replace(/"/g,'&quot;')},${i})">`;
    }).join('');
  }

  // Modal & carousel logic
  window.openProjModal=function(id){
    const p=PROJECTS.find(x=>x.id===id); if(!p)return;
    document.getElementById('mHead').innerHTML=`<h3 style="font-family:var(--font-display);font-size:1.5rem;margin-bottom:4px">${p.title}</h3><p style="opacity:0.6;font-size:0.8rem;margin-bottom:12px">${p.loc}</p>`;
    document.getElementById('mDesc').innerHTML=`<p>${p.full}</p><p style="margin-top:8px"><strong>Technologies:</strong> ${p.tech.join(', ')}</p>`;
    const gal=document.getElementById('mGallery');
    gal.innerHTML=p.media.map((m,i)=>{
      const safeSrc=encodeURI(m.src);
      if(m.type==='image') return `<div class="m-media-wrap" onclick="openCarouselFromList(${JSON.stringify(p.media.map(mm=>({src:encodeURI(mm.src),caption:mm.caption}))).replace(/"/g,'&quot;')},${i})"><img src="${safeSrc}" alt=""></div>`;
      else return `<div class="m-media-wrap" onclick="openVideoModal('${safeSrc}')"><video muted><source src="${safeSrc}" type="video/mp4"></video></div>`;
    }).join('');
    document.getElementById('mPdf').innerHTML=p.pdf?`<a href="${p.pdf}" target="_blank" class="btn btn-dark" style="margin-top:8px;padding:8px 20px;font-size:0.75rem;">PDF Report</a>`:'';
    document.getElementById('projModal').classList.add('on');
  };
  window.closeModal=function(id){document.getElementById(id).classList.remove('on');};

  let currMedia=[],currIdx=0;
  window.openCarouselFromList=function(list,idx){currMedia=list;currIdx=idx;updateCarousel();document.getElementById('carouselModal').classList.add('active');};
  function updateCarousel(){const item=currMedia[currIdx];document.getElementById('carouselImage').src=typeof item==='string'?item:item.src;document.getElementById('carouselCaption').textContent=typeof item==='string'?'':(item.caption||'');}
  window.prevImage=()=>{if(currMedia.length){currIdx=(currIdx-1+currMedia.length)%currMedia.length;updateCarousel();}};
  window.nextImage=()=>{if(currMedia.length){currIdx=(currIdx+1)%currMedia.length;updateCarousel();}};
  window.closeCarousel=()=>{document.getElementById('carouselModal').classList.remove('active');currMedia=[];};
  window.openVideoModal=function(src){document.getElementById('videoPlayer').src=src;document.getElementById('videoModal').classList.add('active');};
  window.closeVideoModal=function(){const v=document.getElementById('videoPlayer');v.pause();v.src='';document.getElementById('videoModal').classList.remove('active');};

  window.openWorkGallery=function(siteId){
    const site=WORK_IMAGES[siteId];if(!site||!site.files.length)return;
    const base=`assets/Professional Career/${site.folder}/`;
    const media=site.files.map((f,i)=>({src:encodeURI(base+f),caption:site.captions[i]||f}));
    openCarouselFromList(media,0);
  };

  // Text scramble
  const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%';
  function scrambleText(el){const orig=el.dataset.text||el.textContent;let frame=0;const total=30;const interval=setInterval(()=>{el.textContent=orig.split('').map((ch,i)=>{if(ch===' ')return' ';if(frame/total>i/orig.length)return ch;return CHARS[Math.floor(Math.random()*CHARS.length)];}).join('');frame++;if(frame>total){el.textContent=orig;clearInterval(interval);}},40);}
  document.querySelectorAll('.scramble').forEach(el=>{ScrollTrigger.create({trigger:el,start:'top 80%',onEnter:()=>scrambleText(el)});});

  // Magnetic buttons & card tilt
  document.querySelectorAll('.magnetic').forEach(btn=>{
    btn.addEventListener('mousemove',e=>{const r=btn.getBoundingClientRect(),x=e.clientX-r.left-r.width/2,y=e.clientY-r.top-r.height/2;gsap.to(btn,{x:x*0.38,y:y*0.38,duration:0.4,ease:'power2.out'});});
    btn.addEventListener('mouseleave',()=>{gsap.to(btn,{x:0,y:0,duration:0.6,ease:'elastic.out(1,0.4)'});});
  });
  document.querySelectorAll('.project-card').forEach(card=>{
    card.addEventListener('mousemove',e=>{const r=card.getBoundingClientRect(),x=(e.clientX-r.left)/r.width-0.5,y=(e.clientY-r.top)/r.height-0.5;gsap.to(card,{rotateY:x*14,rotateX:-y*14,transformPerspective:800,duration:0.4,ease:'power2.out'});});
    card.addEventListener('mouseleave',()=>{gsap.to(card,{rotateY:0,rotateX:0,duration:0.6,ease:'elastic.out(1,0.4)'});});
  });

  // Nav background on scroll
  ScrollTrigger.create({start:'top -80',onUpdate:self=>{const nav=document.querySelector('nav');if(self.progress>0){nav.style.background='rgba(245,244,240,0.85)';nav.style.backdropFilter='blur(12px)';nav.style.borderBottom='1px solid rgba(0,0,0,0.06)';}else{nav.style.background='transparent';nav.style.borderBottom='none';}}});

  // Start everything
  renderSkills();
  buildProjects();
  buildFreelance();
  buildCerts();
});
</script>
